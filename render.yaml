services:
  # Backend
  - type: web
    name: playvibe-backend
    env: node
    region: oregon
    plan: free
    buildCommand: "cd backened && npm install"
    startCommand: "cd backened && npm start"
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false

  # Frontend
  - type: web
    name: playvibe-frontend
    env: static
    buildCommand: "cd frontened && npm install && npm run build"
    staticPublishPath: "./frontened/dist"
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html